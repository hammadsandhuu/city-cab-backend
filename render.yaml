# Render Blueprint — City Airport Taxis API
# Docs: https://render.com/docs/blueprint-spec
#
# Monorepo: set Render "Root directory" to `backend`, then use this file.
# Or use `/render.yaml` at repo root (points rootDir here).
#
# Redis (optional): create free Upstash Redis → paste REDIS_URL in Dashboard
# → set REDIS_ENABLED=true. Leave false to launch without Redis.

services:
  - type: web
    name: city-airport-taxis-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: REDIS_ENABLED
        value: "false"
      - key: SOCKET_ENABLED
        value: "true"
      - key: SOCKET_PATH
        value: /socket.io
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: MAX_SESSIONS_PER_USER
        value: "10"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      # Secrets — set in Render Dashboard:
      # MONGODB_URI, JWT_SECRET, JWT_REFRESH_SECRET,
      # EMAIL_*, CLOUDINARY_*, FRONTEND_URL, ADMIN_FRONTEND_URL
      # Optional Redis (Upstash): REDIS_URL=rediss://default:...@....upstash.io:6379
